{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  <h1>{{ t("error.500_title") }}</h1>
  <p>{{ t("error.500_text") }}</p>
  <p><a href="/">{{ t("error.home_link") }}</a></p>
  {% if show_trace and error_trace %}
  <h2>{{ t("error.trace") }}</h2>
  <pre>{{ error_trace }}</pre>
  {% endif %}
</section>
{% endblock %}
