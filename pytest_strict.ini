[pytest]
addopts = -ra
filterwarnings =
    error::DeprecationWarning
    error::FutureWarning
    ignore::DeprecationWarning:asyncio\.coroutines
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
    ignore::DeprecationWarning:fastapi(\.|$)
    ignore::FutureWarning:fastapi(\.|$)
    ignore::DeprecationWarning:starlette(\.|$)
    ignore::FutureWarning:starlette(\.|$)
    ignore::DeprecationWarning:slowapi(\.|$)
    ignore::FutureWarning:slowapi(\.|$)
    ignore::DeprecationWarning:limits(\.|$)
    ignore::FutureWarning:limits(\.|$)
    ignore::DeprecationWarning:pydantic(\.|$)
    ignore::FutureWarning:pydantic(\.|$)
    ignore::DeprecationWarning:anyio(\.|$)
    ignore::FutureWarning:anyio(\.|$)
    ignore::DeprecationWarning:httpx(\.|$)
    ignore::FutureWarning:httpx(\.|$)
